# Which Plane project maps to which GitHub repo. One workspace, many projects,
# one project per repo. Routing key is project_id (present on every Plane event).
# Copy to targets.yml. No secrets here — GITHUB_TOKEN/PLANE_API_KEY live in .env.
targets:
  - workspace: dem
    project_id: 9a28bd00-ed9c-4f5d-8be9-fc05cbb1fc57   # chessbro project UUID
    github_repo: issachar-vin/chess-bro
    base_branch: main
    # Optional per-repo overrides (fall back to .env defaults):
    # agent_image: ghcr.io/issachar-vin/chess-bro-agent:latest
    # model_engineer: claude-sonnet-4-6

  # - workspace: dem
  #   project_id: 4c11ee00-0000-0000-0000-000000000000
  #   github_repo: issachar-vin/another-repo
  #   base_branch: main
